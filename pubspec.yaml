name: goodly_app
description: GOODLY - Réseau social de bonnes actions sans chat
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.0

  # State Management
  provider: ^6.1.1
  get_it: ^9.2.0

  # Navigation
  go_router: ^17.0.1

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.1

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0

  # Image Picker & Camera
  image_picker: ^1.0.7
  camera: ^0.11.3

  # Video Player
  video_player: ^2.8.2
  chewie: ^1.7.5
  visibility_detector: ^0.4.0+2

  # Permission Handler
  permission_handler: ^12.0.1

  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.3.3
  path_provider: ^2.1.2

  # Charts
  fl_chart: ^0.68.0

  # Form Validation
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0
  url_launcher: ^6.3.2
  flutter_stripe: ^12.1.1
  webview_flutter: ^4.10.0
  intl_phone_field: ^3.2.0

  # Social Login
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  share_plus: ^7.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/l10n/

  # Fonts can be added here if needed
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
