name: Build Flutter Web and Commit to Main

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build web for production
        run: flutter build web --release --dart-define=ENVIRONMENT=production
      
      - name: Commit build to main branch
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Remove old web-build folder if exists
          rm -rf web-build
          
          # Copy build output to web-build folder
          cp -r build/web web-build
          
          # Add and commit
          git add web-build
          git diff --quiet && git diff --staged --quiet || git commit -m "Update web build [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
