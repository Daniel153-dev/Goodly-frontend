name: Build and Deploy to Vercel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
        working-directory: goodly_frontend/goodly_app
      
      - name: Build web for production
        run: flutter build web --release --dart-define=ENVIRONMENT=production
        working-directory: goodly_frontend/goodly_app
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: goodly_frontend/goodly_app/build/web
          retention-days: 1

  deploy-to-vercel-branch:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist
      
      - name: Deploy to gh-pages branch for Vercel
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout --orphan gh-pages
          git rm -rf . 2>/dev/null || true
          cp -r dist/* .
          rm -rf dist
          echo "Deployed at $(date)" > README.md
          git add .
          git commit -m "Deploy to Vercel - $(date)"
          git push origin gh-pages --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
