    }

    # Proxy pour /upload vers le backend (uploads de fichiers)
    location /upload- {
        proxy_pass https://goodly-backend-1.onrender.com;
        proxy_http_version 1.1;
        proxy_set_header Host goodly-backend-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_request_buffering off;
    }

    # Proxy pour /proxy/r2 vers le backend (images R2)
    # Ajout des headers CORS pour permettre l'accès aux images
    location /proxy/r2/ {
        # Option 1: Proxy vers backend (utilise le cache du backend)
        # proxy_pass https://goodly-backend-1.onrender.com/proxy/r2/;
        # proxy_http_version 1.1;
        # proxy_set_header Host goodly-backend-1.onrender.com;
        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header X-Forwarded-Proto $scheme;
        # proxy_ssl_server_name on;
        # proxy_ssl_verify off;
        
        # Option 2: Accès direct aux images R2 avec CORS
        # Extraire le chemin R2 de l'URL
        set $r2_path $uri;
        # Remplacer /proxy/r2/ par le chemin du bucket
        set $r2_path_new $uri;
        if ($uri ~ ^/proxy/r2/(.*)$) {
            set $r2_path_new $1;
        }
        # Proxy vers R2 avec les bons headers
        proxy_pass https://pub-3ae5fc4733fcd00af3d6ec309a75be0b.r2.dev/$r2_path_new;
        proxy_http_version 1.1;
        proxy_set_header Host pub-3ae5fc4733fcd00af3d6ec309a75be0b.r2.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        
        # Headers CORS
        add_header Access-Control-Allow-Origin 'https://www.goodlyapp.abrdns.com,https://goodlyapp.abrdns.com,https://goodly.ink' always;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Accept, Authorization, Content-Type' always;
        add_header Access-Control-Expose-Headers 'Content-Length, Content-Type' always;
    }

    # Proxy pour /proxy vers le backend
    location /proxy {
        proxy_pass https://goodly-backend-1.onrender.com/proxy;
        proxy_http_version 1.1;
        proxy_set_header Host goodly-backend-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }


    # Routing pour Flutter Web (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Securite
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
