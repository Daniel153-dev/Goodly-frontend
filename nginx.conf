server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Limite de taille pour les uploads (2MB)
    client_max_body_size 2M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache pour les fichiers statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy pour les requetes API vers le backend
    location /api/ {
        proxy_pass https://goodly-backend-1.onrender.com;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host goodly-backend-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy pour /auth vers le backend (sans slash)
    location /auth {
        proxy_pass https://goodly-backend-1.onrender.com/auth;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host goodly-backend-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Proxy pour /auth vers le backend
    location /auth/ {
        proxy_pass https://goodly-backend-1.onrender.com/auth/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host goodly-backend-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Proxy pour /shops vers le backend (avec et sans slash)
    location /shops {
        proxy_pass https://goodly-backend-1.onrender.com/shops;
        proxy_http_version 1.1;
        proxy_set_header Host goodly-backend-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Proxy pour /shops/ vers le backend (version avec slash)
    location /shops/ {
        proxy_pass https://goodly-backend-1.onrender.com/shops/;
        proxy_http_version 1.1;
        proxy_set_header Host goodly-backend-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Proxy pour /moderation vers le backend
    location /moderation/ {
        proxy_pass https://goodly-backend-1.onrender.com/moderation/;
        proxy_http_version 1.1;
        proxy_set_header Host goodly-backend-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Proxy pour /leaderboard vers le backend
    location /leaderboard/ {
        proxy_pass https://goodly-backend-1.onrender.com/leaderboard/;
        proxy_http_version 1.1;
        proxy_set_header Host goodly-backend-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Proxy pour /events vers le backend (avec et sans slash)
    location /events {
        proxy_pass https://goodly-backend-1.onrender.com/events;
        proxy_http_version 1.1;
        proxy_set_header Host goodly-backend-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Proxy pour /events/ vers le backend (version avec slash)
    location /events/ {
        proxy_pass https://goodly-backend-1.onrender.com/events/;
        proxy_http_version 1.1;
        proxy_set_header Host goodly-backend-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Proxy pour /products vers le backend
    location /products {
        proxy_pass https://goodly-backend-1.onrender.com/products;
        proxy_http_version 1.1;
        proxy_set_header Host goodly-backend-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Proxy pour /publications vers le backend
    location /publications/ {
        proxy_pass https://goodly-backend-1.onrender.com/publications/;
        proxy_http_version 1.1;
        proxy_set_header Host goodly-backend-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Proxy pour /upload vers le backend (uploads de fichiers)
    location /upload- {
        proxy_pass https://goodly-backend-1.onrender.com;
        proxy_http_version 1.1;
        proxy_set_header Host goodly-backend-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_request_buffering off;
    }

    # Proxy vers R2 pour les images avec CORS
    location /proxy/r2/ {
        # Enlever /proxy/r2/ du chemin avant de proxy
        rewrite ^/proxy/r2/(.*)$ /$1 break;
        
        # Proxy vers R2 directement
        proxy_pass https://pub-3ae5fc4733fcd00af3d6ec309a75be0b.r2.dev;
        
        proxy_http_version 1.1;
        proxy_set_header Host pub-3ae5fc4733fcd00af3d6ec309a75be0b.r2.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        
        # Headers CORS
        add_header Access-Control-Allow-Origin "https://goodly.ink,https://www.goodly.ink" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        
        # Cache
        expires 1y;
    }

    # Routing pour Flutter Web (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Securite
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
