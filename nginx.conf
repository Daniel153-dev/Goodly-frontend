    # Proxy pour /events vers le backend (avec et sans slash)
    location /events {
        proxy_pass https://goodly-backend-1.onrender.com/events;
        proxy_http_version 1.1;
        proxy_set_header Host goodly-backend-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Proxy pour /events/ vers le backend (version avec slash)
    location /events/ {
        proxy_pass https://goodly-backend-1.onrender.com/events/;
        proxy_http_version 1.1;
        proxy_set_header Host goodly-backend-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
